<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAssist AI — Trouver un artisan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
       body { 
    font-family: Arial, sans-serif; 
    min-height: 100vh;
    background: url('/static/African_Home.webp') center center fixed;
    background-size: cover;
}
        .header { background: #5C4A32; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
        .logo { width: 38px; height: 38px; background: #8B6F47; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header-info h1 { font-size: 16px; font-weight: 500; color: #FDFAF5; }
        .header-info p { font-size: 12px; color: #C4A882; }
        .header-nav { margin-left: auto; display: flex; gap: 4px; }
        .header-nav a { font-size: 12px; color: #C4A882; padding: 6px 12px; border-radius: 8px; text-decoration: none; }
        .header-nav a:hover { background: #8B6F47; color: #FDFAF5; }
        .container { max-width: 700px; margin: 30px auto; padding: 0 20px; }
        .search-card { background: #FDFAF5; border-radius: 12px; padding: 20px; border: 0.5px solid #D4C4A8; margin-bottom: 20px; }
        .search-card h2 { color: #5C4A32; font-size: 15px; font-weight: 500; margin-bottom: 15px; }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .cat-btn { border: 0.5px solid #D4C4A8; border-radius: 8px; padding: 10px 6px; text-align: center; cursor: pointer; background: #F5F0E8; font-size: 12px; color: #5C4A32; }
        .cat-btn:hover, .cat-btn.active { background: #E8DCC8; border-color: #8B6F47; font-weight: 500; color: #3A2E22; }
        .cat-btn .icon { font-size: 18px; display: block; margin-bottom: 3px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; color: #6B5740; font-weight: 500; }
        .form-group select, .form-group input { padding: 10px 14px; border: 0.5px solid #D4C4A8; border-radius: 8px; font-size: 14px; outline: none; background: #F5F0E8; color: #3A2E22; }
        .form-group select:focus, .form-group input:focus { border-color: #8B6F47; background: #FDFAF5; }
        .btn { width: 100%; padding: 12px; background: #6B8F5E; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .btn:hover { background: #5C4A32; }
        .artisan-card { background: #FDFAF5; border-radius: 12px; padding: 18px; border: 0.5px solid #D4C4A8; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .artisan-card:hover { border-color: #8B6F47; background: #FDF8F0; }
        .artisan-info h3 { font-size: 15px; color: #3A2E22; margin-bottom: 4px; font-weight: 500; }
        .artisan-info p { font-size: 12px; color: #8B6F47; margin-bottom: 2px; }
        .specialite-badge { display: inline-block; background: #E8DCC8; color: #5C4A32; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; margin-bottom: 6px; }
        .dispo-badge { display: inline-block; background: #E8F0E4; color: #3A5C30; padding: 3px 8px; border-radius: 20px; font-size: 11px; margin-left: 6px; }
        .artisan-actions { display: flex; flex-direction: column; gap: 6px; }
        .btn-appeler { padding: 8px 16px; background: #6B8F5E; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; text-align: center; }
        .btn-appeler:hover { background: #5C4A32; }
        .btn-reserver { padding: 8px 16px; background: #E8DCC8; color: #5C4A32; border: 0.5px solid #8B6F47; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; text-align: center; }
        .btn-reserver:hover { background: #D4C4A8; }
        .empty { text-align: center; color: #8B6F47; padding: 30px; font-size: 14px; background: #FDFAF5; border-radius: 12px; border: 0.5px solid #D4C4A8; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🏠</div>
    <div class="header-info">
        <h1>HomeAssist AI — Trouver un artisan</h1>
        <p>Trouvez le bon prestataire près de chez vous</p>
    </div>
    <nav class="header-nav">
        <a href="/">🏠 Accueil</a>
        <a href="/artisans">🔧 Artisans</a>
        <a href="/reservation">📅 Réservation</a>
        <a href="/inscription">➕ Inscription</a>
        <a href="/admin">⚙️ Admin</a>
    </nav>
</div>

<div class="container">
    <div class="search-card">
        <h2>🔍 Rechercher par catégorie</h2>
        <div class="cat-grid">
            <div class="cat-btn" onclick="selectCat(this,'maison')"><span class="icon">🏡</span>Employé maison</div>
            
            <div class="cat-btn" onclick="selectCat(this,'lectricien')"><span class="icon">⚡</span>Électricien</div>
            <div class="cat-btn" onclick="selectCat(this,'Plombier')"><span class="icon">🚿</span>Plombier</div>
            <div class="cat-btn" onclick="selectCat(this,'Frigoriste')"><span class="icon">❄️</span>Frigoriste</div>
            <div class="cat-btn" onclick="selectCat(this,'gaz')"><span class="icon">🔥</span>Gaz</div>
            <div class="cat-btn" onclick="selectCat(this,'Macon')"><span class="icon">🧱</span>Maçon</div>
            <div class="cat-btn" onclick="selectCat(this,'Vitrier')"><span class="icon">🪟</span>Vitrier</div>
            <div class="cat-btn" onclick="selectCat(this,'Menuisier')"><span class="icon">🪚</span>Menuisier</div>
            <div class="cat-btn" onclick="selectCat(this,'Jardinier')"><span class="icon">🌿</span>Jardinier</div>
            <div class="cat-btn" onclick="selectCat(this,'nage')"><span class="icon">🧹</span>Ménage</div>
            <div class="cat-btn" onclick="selectCat(this,'Coursier')"><span class="icon">🛒</span>Courses</div>
            <div class="cat-btn" onclick="selectCat(this,'Garde')"><span class="icon">👶</span>Garde</div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Ville</label>
                <select id="ville">
                    <option value="">Toutes les villes</option>
                    <option>Abidjan</option><option>Bouaké</option><option>Yamoussoukro</option>
                    <option>Korhogo</option><option>Man</option><option>Ouagadougou</option>
                    <option>Dakar</option><option>Bamako</option><option>Lomé</option>
                </select>
            </div>
            <div class="form-group">
                <label>Quartier (optionnel)</label>
                <input type="text" id="quartier" placeholder="Ex: Cocody, Plateau...">
            </div>
        </div>
        <button class="btn" onclick="rechercher()">🔍 Rechercher</button>
    </div>

    <div id="results"></div>
</div>

<script>
    let selectedCat = "";

    function selectCat(el, cat) {
        document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
        el.classList.add("active");
        selectedCat = cat;
        rechercher();
    }

    async function rechercher() {
        const ville = document.getElementById("ville").value;
        const quartier = document.getElementById("quartier").value;
        const response = await fetch("/chercher_artisans", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ville, quartier, specialite: selectedCat })
        });
        const data = await response.json();
        const results = document.getElementById("results");
        if (data.artisans.length === 0) {
            results.innerHTML = `<div class="empty">😔 Aucun artisan trouvé pour cette recherche.<br><br>
            <a href="/inscription" style="color:#5C4A32;font-weight:500;">Vous êtes artisan ? Inscrivez-vous !</a></div>`;
            return;
        }
        results.innerHTML = data.artisans.map(a => `
            <div class="artisan-card">
                <div class="artisan-info">
                    <div>
                        <span class="specialite-badge">${a.specialite}</span>
                        <span class="dispo-badge">✅ Disponible</span>
                    </div>
                    <h3>🔧 ${a.nom} ${a.prenom}</h3>
                    <p>📍 ${a.ville}${a.quartier ? ' — ' + a.quartier : ''}</p>
                    <p>⏱️ Expérience : ${a.experience || 'Non précisée'}</p>
                </div>
                <div class="artisan-actions">
                    <a href="tel:${a.telephone}" class="btn-appeler">📞 Appeler</a>
                    <a href="/reservation" class="btn-reserver">📅 Réserver</a>
                </div>
            </div>
        `).join("");
    }

    rechercher();
</script>
</body>
</html>
