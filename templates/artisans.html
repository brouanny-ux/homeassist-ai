        .logo { width: 38px; height: 38px; background: #8B6F47; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all .2s; text-decoration: none; }

        .header-info h1 { font-size: 16px; font-weight: 500; color: #FDFAF5; }
        .header-info p { font-size: 12px; color: #C4A882; }
        .header-nav { margin-left: auto; display: flex; gap: 4px; }
        .header-nav a { font-size: 12px; color: #C4A882; padding: 6px 12px; border-radius: 8px; text-decoration: none; transition: background .15s; }
        .header-nav a:hover { background: #8B6F47; color: #FDFAF5; }

        .hero { background: #5C4A32; padding: 40px 20px; text-align: center; }
        .hero h2 { color: #FDFAF5; font-size: 28px; font-weight: 500; margin-bottom: 8px; }
        .hero p { color: #C4A882; font-size: 14px; margin-bottom: 20px; }
        .search-bar { display: flex; gap: 10px; max-width: 500px; margin: 0 auto; }
        .search-bar input { flex: 1; padding: 12px 18px; border: none; border-radius: 10px; font-size: 14px; outline: none; }
        .search-bar button { padding: 12px 24px; background: #6B8F5E; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 500; }
        .search-bar button:hover { background: #5C4A32; }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* GRILLE CATÉGORIES */
        .section-title { font-size: 20px; font-weight: 500; color: #5C4A32; margin-bottom: 20px; }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }

        .cat-card { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; height: 160px; transition: transform .2s, box-shadow .2s; }
        .cat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
        .cat-card:hover img { transform: scale(1.05); }
        .cat-card .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 60%); }
        .cat-card .cat-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 14px; }
        .cat-card .cat-label h3 { color: white; font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-card .cat-label p { color: rgba(255,255,255,0.75); font-size: 11px; margin-top: 2px; }
        .cat-card.active { outline: 3px solid #6B8F5E; }

        /* SOUS-CATÉGORIES */
        .sub-section { display: none; margin-bottom: 40px; }
        .sub-section.active { display: block; }
        .sub-section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .back-btn { background: #E8DCC8; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #5C4A32; font-weight: 500; }
        .back-btn:hover { background: #D4C4A8; }
        .sub-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .sub-card { position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; height: 130px; transition: all .2s; }
        .sub-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
        .sub-card img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
        .sub-card:hover img { transform: scale(1.08); }
        .sub-card .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 60%); }
        .sub-card .sub-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 12px; }
        .sub-card .sub-label h4 { color: white; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }

        /* RÉSULTATS ARTISANS */
        .results-section { display: none; margin-bottom: 40px; }
        .results-section.active { display: block; }
        .artisan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .artisan-card { background: white; border-radius: 12px; padding: 20px; border: 0.5px solid #D4C4A8; transition: all .2s; }
        .artisan-card:hover { box-shadow: 0 6px 20px rgba(92,74,50,0.15); border-color: #8B6F47; }
        .artisan-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .artisan-avatar { width: 48px; height: 48px; background: #E8DCC8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .artisan-name { font-size: 15px; font-weight: 500; color: #3A2E22; }
        .artisan-spec { font-size: 12px; color: #8B6F47; }
        .artisan-info { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; background: #E8DCC8; color: #5C4A32; }
        .badge.green { background: #E8F0E4; color: #3A5C30; }
        .artisan-actions { display: flex; gap: 8px; }
        .btn-call { flex: 1; padding: 9px; background: #5C4A32; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; text-align: center; text-decoration: none; display: block; }
        .btn-call:hover { background: #6B8F5E; }
        .btn-reserve { flex: 1; padding: 9px; background: #E8DCC8; color: #5C4A32; border: 0.5px solid #8B6F47; border-radius: 8px; font-size: 13px; cursor: pointer; text-align: center; text-decoration: none; display: block; }
        .empty { text-align: center; color: #8B6F47; padding: 40px; background: white; border-radius: 12px; border: 0.5px solid #D4C4A8; }

        @media (max-width: 768px) {
            .cat-grid { grid-template-columns: repeat(2, 1fr); }
            .sub-grid { grid-template-columns: repeat(2, 1fr); }

        }
    </style>

let currentCat = null;
let currentSub = null;
let allArtisans = [];

// Construire la grille des catégories
function buildCatGrid() {
    const grid = document.getElementById("catGrid");
    grid.innerHTML = categories.map(cat => `
        <div class="cat-card" onclick="showSubs('${cat.id}')">
            <img src="${cat.img}" alt="${cat.label}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80'">
            <div class="overlay"></div>
            <div class="cat-label">
                <h3>${cat.label}</h3>
                <p>${cat.desc}</p>
            </div>
        </div>
    `).join("");
}

// Afficher sous-catégories
function showSubs(catId) {
    currentCat = categories.find(c => c.id === catId);
    document.getElementById("mainSection").style.display = "none";
    document.getElementById("subSection").classList.add("active");
    document.getElementById("resultsSection").classList.remove("active");
    document.getElementById("subTitle").textContent = currentCat.label;

    const grid = document.getElementById("subGrid");
    grid.innerHTML = currentCat.subs.map(sub => `
        <div class="sub-card" onclick="showArtisans('${sub.spec}', '${sub.label}')">
            <img src="${sub.img}" alt="${sub.label}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80'">
            <div class="overlay"></div>
            <div class="sub-label">
                <h4>${sub.label}</h4>
            </div>
        </div>
    `).join("");
}

// Afficher artisans
async function showArtisans(spec, label) {
    currentSub = label;
    document.getElementById("subSection").classList.remove("active");
    document.getElementById("resultsSection").classList.add("active");
    document.getElementById("resultsTitle").textContent = label;

    const grid = document.getElementById("artisanGrid");
    grid.innerHTML = `<div class="empty">🔍 Recherche en cours...</div>`;

    try {
        const res = await fetch("/chercher_artisans", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ville: "", quartier: "", specialite: spec })
        });
        const data = await res.json();
        afficherArtisans(data.artisans, label);
    } catch(e) {
        grid.innerHTML = `<div class="empty">❌ Erreur de connexion</div>`;
    }
}

function afficherArtisans(artisans, label) {
    const grid = document.getElementById("artisanGrid");
    if (!artisans.length) {
        grid.innerHTML = `
            <div class="empty" style="grid-column:1/-1;">
                😔 Aucun artisan disponible pour "${label}" pour le moment.<br><br>
                <a href="/inscription" style="color:#5C4A32;font-weight:500;">Vous êtes artisan ? Inscrivez-vous !</a>
            </div>`;
        return;
    }
    grid.innerHTML = artisans.map(a => `
        <div class="artisan-card">
            <div class="artisan-header">
                <div class="artisan-avatar">🔧</div>
                <div>
                    <div class="artisan-name">${a.nom} ${a.prenom}</div>
                    <div class="artisan-spec">${a.specialite}</div>
                </div>
            </div>
            <div class="artisan-info">
                <span class="badge">📍 ${a.ville}${a.quartier ? ' — ' + a.quartier : ''}</span>
                <span class="badge green">✅ Disponible</span>
                ${a.experience ? `<span class="badge">⏱️ ${a.experience}</span>` : ''}
            </div>
            <div class="artisan-actions">
                <a href="tel:${a.telephone}" class="btn-call">📞 Appeler</a>
                <a href="/reservation" class="btn-reserve">📅 Réserver</a>
            </div>
        </div>
    `).join("");
}

// Recherche directe
async function searchArtisans(query) {
    if (!query.trim()) { showMain(); return; }
    document.getElementById("mainSection").style.display = "none";
    document.getElementById("subSection").classList.remove("active");
    document.getElementById("resultsSection").classList.add("active");
    document.getElementById("resultsTitle").textContent = `Résultats pour "${query}"`;

    const grid = document.getElementById("artisanGrid");
    grid.innerHTML = `<div class="empty">🔍 Recherche en cours...</div>`;

    try {
        const res = await fetch("/chercher_artisans", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ville: "", quartier: "", specialite: query })
        });
        const data = await res.json();
        afficherArtisans(data.artisans, query);
    } catch(e) {
        grid.innerHTML = `<div class="empty">❌ Erreur de connexion</div>`;
    }
}

function showMain() {
    document.getElementById("mainSection").style.display = "block";
    document.getElementById("subSection").classList.remove("active");
    document.getElementById("resultsSection").classList.remove("active");
}

function showSub() {
    if (currentCat) showSubs(currentCat.id);
}

buildCatGrid();
</script>
