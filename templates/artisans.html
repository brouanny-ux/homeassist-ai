        .search-bar input { flex: 1; padding: 12px 18px; border: none; border-radius: 10px; font-size: 14px; outline: none; }
        .search-bar button { padding: 12px 24px; background: #6B8F5E; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 500; }

        .sub-card .sub-label h4 { color: white; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
        .results-section { display: none; margin-bottom: 40px; }

        .artisan-spec { font-size: 12px; color: #8B6F47; }

let currentCat = null;

function buildCatGrid() {
    const grid = document.getElementById("catGrid");
    grid.innerHTML = categories.map(cat => `
        <div class="cat-card" onclick="showSubs('${cat.id}')">
            <img src="${cat.img}" alt="${cat.label}" loading="lazy">
            <div class="overlay"></div>
            <div class="cat-label">
                <h3>${cat.label}</h3>
                <p>${cat.desc}</p>
            </div>
        </div>
    `).join("");
}

function showSubs(catId) {
    currentCat = categories.find(c => c.id === catId);
    document.getElementById("mainSection").style.display = "none";
    document.getElementById("subSection").classList.add("active");
    document.getElementById("resultsSection").classList.remove("active");
    document.getElementById("subTitle").textContent = currentCat.label;
    const grid = document.getElementById("subGrid");
    grid.innerHTML = currentCat.subs.map(sub => {
        const img = SUB_IMAGES[sub.label] || currentCat.img;
        return `
        <div class="sub-card" onclick="showArtisans('${sub.spec}', '${sub.label}')">
            <img src="${img}" alt="${sub.label}" loading="lazy" onerror="this.src='${currentCat.img}'">
            <div class="overlay"></div>
            <div class="sub-label"><h4>${sub.label}</h4></div>
        </div>`;
    }).join("");
}

async function showArtisans(spec, label) {
    document.getElementById("subSection").classList.remove("active");
    document.getElementById("resultsSection").classList.add("active");
    document.getElementById("resultsTitle").textContent = label;
    const grid = document.getElementById("artisanGrid");
    grid.innerHTML = `<div class="empty">🔍 Recherche en cours...</div>`;
    try {
        const res = await fetch("/chercher_artisans", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ville: "", quartier: "", specialite: spec })
        });
        const data = await res.json();
        afficherArtisans(data.artisans, label);
    } catch(e) {
        grid.innerHTML = `<div class="empty">❌ Erreur de connexion</div>`;
    }
}

function afficherArtisans(artisans, label) {
    const grid = document.getElementById("artisanGrid");
    if (!artisans.length) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">😔 Aucun artisan disponible pour "${label}".<br><br><a href="/inscription" style="color:#5C4A32;font-weight:500;">Vous êtes artisan ? Inscrivez-vous !</a></div>`;
        return;
    }
    grid.innerHTML = artisans.map(a => `
        <div class="artisan-card">
            <div class="artisan-header">
                <div class="artisan-avatar">🔧</div>
                <div>
                    <div class="artisan-name">${a.nom} ${a.prenom}</div>
                    <div class="artisan-spec">${a.specialite}</div>
                </div>
                <div id="note-${a.id}" style="margin-left:auto;text-align:right;">
                    <div style="color:#F59E0B;font-size:16px;">⭐ --</div>
                    <div style="font-size:10px;color:#8B6F47;">Chargement...</div>
                </div>
            </div>
            <div class="artisan-info">
                <span class="badge">📍 ${a.ville}${a.quartier ? ' — ' + a.quartier : ''}</span>
                <span class="badge green">✅ Disponible</span>
                ${a.experience ? `<span class="badge">⏱️ ${a.experience}</span>` : ''}
            </div>
            <div class="artisan-actions">
                <a href="tel:${a.telephone}" class="btn-call">📞 Appeler</a>
                <a href="/reservation" class="btn-reserve">📅 Réserver</a>
                <button onclick="ouvrirNotation(${a.id}, '${a.nom} ${a.prenom}')" style="padding:9px 12px;background:#E8DCC8;border:0.5px solid #8B6F47;border-radius:8px;font-size:13px;cursor:pointer;color:#5C4A32;">⭐ Noter</button>
            </div>
        </div>
    `).join("");
    artisans.forEach(a => chargerNote(a.id));
}

async function chargerNote(artisanId) {
    try {
        const res = await fetch(`/note_artisan/${artisanId}`);
        const data = await res.json();
        const el = document.getElementById(`note-${artisanId}`);
        if (el) {
            if (data.total > 0) {
                el.innerHTML = `<div style="color:#F59E0B;font-size:16px;">⭐ ${data.moyenne}/5</div><div style="font-size:10px;color:#8B6F47;">${data.total} avis</div>`;
            } else {
                el.innerHTML = `<div style="color:#C4A882;font-size:13px;">Nouveau</div>`;
            }
        }
    } catch(e) {}
}

function ouvrirNotation(artisanId, nom) {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `
        <div style="background:#FDFAF5;border-radius:16px;padding:24px;width:90%;max-width:400px;border:0.5px solid #D4C4A8;">
            <h3 style="color:#5C4A32;margin-bottom:16px;">⭐ Noter ${nom}</h3>
            <div style="display:flex;gap:8px;margin-bottom:16px;justify-content:center;">
                ${[1,2,3,4,5].map(i => `<span onclick="setNote(${i})" id="star-${i}" style="font-size:32px;cursor:pointer;opacity:0.3;">⭐</span>`).join('')}
            </div>
            <textarea id="avis-text" placeholder="Votre avis (optionnel)..." style="width:100%;padding:10px;border:0.5px solid #D4C4A8;border-radius:8px;font-size:13px;height:80px;resize:none;background:#F5F0E8;"></textarea>
            <div style="display:flex;gap:8px;margin-top:12px;">
                <button onclick="this.closest('div[style]').remove()" style="flex:1;padding:10px;background:#E8DCC8;border:none;border-radius:8px;cursor:pointer;color:#5C4A32;">Annuler</button>
                <button onclick="envoyerNote(${artisanId})" style="flex:1;padding:10px;background:#5C4A32;border:none;border-radius:8px;cursor:pointer;color:white;">Envoyer ⭐</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    window._noteSelectionnee = 0;
}

function setNote(n) {
    window._noteSelectionnee = n;
    for(let i=1;i<=5;i++) {
        document.getElementById(`star-${i}`).style.opacity = i <= n ? '1' : '0.3';
    }
}

async function envoyerNote(artisanId) {
    const note = window._noteSelectionnee;
    if (!note) { alert('Veuillez choisir une note !'); return; }
    const avis = document.getElementById('avis-text').value;
    try {
        const res = await fetch('/noter_artisan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ artisan_id: artisanId, note, avis })
        });
        const data = await res.json();
        if (data.success) {
            document.querySelector('div[style*="position:fixed"]').remove();
            chargerNote(artisanId);
            alert('✅ Merci pour votre avis !');
        } else {
            alert('⚠️ ' + (data.error || 'Erreur'));
        }
    } catch(e) {
        alert('❌ Erreur de connexion');
    }
}

async function searchArtisans(query) {
    if (!query.trim()) { showMain(); return; }
    document.getElementById("mainSection").style.display = "none";
    document.getElementById("subSection").classList.remove("active");
    document.getElementById("resultsSection").classList.add("active");
    document.getElementById("resultsTitle").textContent = `Résultats pour "${query}"`;
    const grid = document.getElementById("artisanGrid");
    grid.innerHTML = `<div class="empty">🔍 Recherche en cours...</div>`;
    try {
        const res = await fetch("/chercher_artisans", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ville: "", quartier: "", specialite: query })
        });
        const data = await res.json();
        afficherArtisans(data.artisans, query);
    } catch(e) {
        grid.innerHTML = `<div class="empty">❌ Erreur de connexion</div>`;
    }
}

function showMain() {
    document.getElementById("mainSection").style.display = "block";
    document.getElementById("subSection").classList.remove("active");
    document.getElementById("resultsSection").classList.remove("active");
}

function showSub() {
    if (currentCat) showSubs(currentCat.id);
}

buildCatGrid();
</script>
</body>
</html>
